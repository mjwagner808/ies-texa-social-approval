<script>
(function () {
  'use strict';

  // ----------------------------------------------------------------
  // Constants
  // ----------------------------------------------------------------
  var STATUS_COLORS = {
    'Local_Client_Review': '#FF9800',
    'Revising':            '#0D9488',
    'Awaiting_Corporate':  '#6366F1',
    'Corporate_Review':    '#9C27B0',
    'Approved':            '#4CAF50',
    'Published':           '#1B5E20'
  };

  // Human-readable labels from the client perspective.
  var STATUS_LABELS_LOCAL = {
    'Local_Client_Review': 'Your review needed',
    'Revising':            'Agency is revising',
    'Awaiting_Corporate':  'Send to Corporate',
    'Corporate_Review':    'In corporate review',
    'Approved':            'Approved',
    'Published':           'Published'
  };
  var STATUS_LABELS_CORP = {
    'Revising':         'Changes submitted',
    'Corporate_Review': 'Your review needed',
    'Approved':         'Approved',
    'Published':        'Published'
  };

  var STATUS_LABELS = IS_CORPORATE ? STATUS_LABELS_CORP : STATUS_LABELS_LOCAL;

  // Status where this client can take action.
  var ACTIONABLE_STATUS = IS_CORPORATE ? 'Corporate_Review' : 'Local_Client_Review';

  // Statuses that are visually muted (done).
  var DONE_STATUSES = { 'Approved': true, 'Published': true };

  // Platform abbreviations for card chips.
  var PLATFORM_ABBR = { 'LinkedIn': 'in', 'Facebook': 'fb', 'Instagram': 'ig' };

  var MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];

  // ----------------------------------------------------------------
  // State
  // ----------------------------------------------------------------
  var state = {
    posts: [],
    current: new Date(),   // month being viewed
    activePost: null,
    activeComments: [],
    activeCanUndo: false
  };

  // Remembered for the length of this browser session only (URL-delivered
  // corporate links). Lets someone commenting or deciding on several posts in
  // one sitting type it once instead of every time, while still being able
  // to change it if a different person picks up the same link later.
  var sessionSourceTag = '';
  var sessionDecidedByName = '';

  // ----------------------------------------------------------------
  // Utilities
  // ----------------------------------------------------------------
  function $(id) { return document.getElementById(id); }

  function esc(s) {
    return String(s === null || s === undefined ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function showSpinner(on) {
    $('spinnerVeil').className = on ? 'spinner-veil show' : 'spinner-veil';
  }

  var toastTimer = null;
  function toast(msg, type) {
    var t = $('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type === 'error' ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.className = 'toast'; }, type === 'error' ? 10000 : 6000);
  }

  function fail(err) {
    showSpinner(false);
    var msg = (err && err.message) ? err.message : String(err);
    toast('Error: ' + msg);
  }

  function run(fnName) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function (resolve, reject) {
      var runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject);
      runner[fnName].apply(runner, args);
    });
  }

  function parseDateOnly(value) {
    var s = String(value || '').trim();
    if (!s) return null;
    var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return new Date(parseInt(m[1], 10), parseInt(m[2], 10) - 1, parseInt(m[3], 10));
    var d = new Date(s);
    return isNaN(d.getTime()) ? null : new Date(d.getFullYear(), d.getMonth(), d.getDate());
  }

  // Earliest scheduled date among posts this client can actually act on right
  // now. Used once on initial load so the calendar opens on the month with
  // waiting work instead of always defaulting to today's month, e.g. reviewing
  // August posts in July (MJ, 2026-07-08).
  function earliestActionableDate() {
    var earliest = null;
    state.posts.forEach(function (p) {
      if (p.Status !== ACTIONABLE_STATUS) return;
      var d = parseDateOnly(p.Scheduled_Date);
      if (!d) return;
      if (!earliest || d < earliest) earliest = d;
    });
    return earliest;
  }

  function ymd(d) {
    return d.getFullYear() + '-' +
      ('0' + (d.getMonth() + 1)).slice(-2) + '-' +
      ('0' + d.getDate()).slice(-2);
  }

  function niceDate(value) {
    var d = parseDateOnly(value);
    if (!d) return '';
    var short = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return short[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function classifyMedia(url) {
    var u = String(url || '').trim();
    if (!u) return { type: 'none', url: '', thumbUrl: '' };
    var lower = u.toLowerCase();
    if (lower.indexOf('box.com/shared/static/') !== -1) return { type: 'image', url: u, thumbUrl: u };
    // Box shared links (/s/TOKEN) use the same token as the direct-static link.
    var boxShareMatch = u.match(/\/s\/([a-zA-Z0-9]+)/);
    if (lower.indexOf('box.com/s/') !== -1 && boxShareMatch) {
      var boxDirectUrl = u.replace(/\/s\/([a-zA-Z0-9]+).*/, '/shared/static/' + boxShareMatch[1]);
      return { type: 'image', url: boxDirectUrl, thumbUrl: boxDirectUrl };
    }
    if (lower.indexOf('box.com') !== -1) return { type: 'box', url: u, thumbUrl: u };
    // Google Drive — works for both images and videos (e.g. Reels). We don't
    // know the file type from the URL alone, so: the card/tooltip thumbnail
    // always uses Drive's thumbnail endpoint (it generates a poster frame for
    // video files, same as it does for images). The full detail-panel view
    // uses Drive's /preview endpoint instead of the thumbnail — that endpoint
    // is Google's own iframe-embeddable viewer and renders a working video
    // player for video files, a normal image view for images, with no need
    // to detect which one it is. Type 'drive' (not 'image') tells the panel
    // renderer to embed an iframe instead of an <img> (MJ, 2026-07-08).
    if (lower.indexOf('drive.google.com') !== -1) {
      var driveMatch = u.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || u.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (driveMatch) {
        return {
          type: 'drive',
          url: 'https://drive.google.com/file/d/' + driveMatch[1] + '/preview',
          thumbUrl: 'https://drive.google.com/thumbnail?id=' + driveMatch[1] + '&sz=w400'
        };
      }
      return { type: 'link', url: u, thumbUrl: u };
    }
    if (lower.indexOf('canva.com') !== -1) return { type: 'canva', url: u, thumbUrl: u };
    if (/\.(png|jpg|jpeg|gif|webp)(\?.*)?$/.test(lower) ||
        lower.indexOf('s3.amazonaws.com') !== -1) return { type: 'image', url: u, thumbUrl: u };
    return { type: 'link', url: u, thumbUrl: u };
  }

  function getPrimaryMediaUrl(p) {
    var fields = ['Instagram_URL','Facebook_URL','LinkedIn_URL','Carousel_URLs','Media_URL'];
    for (var i = 0; i < fields.length; i++) {
      var val = String(p[fields[i]] || '').trim();
      if (!val) continue;
      var first = val.split('\n')[0].trim();
      if (first) return first;
    }
    return '';
  }

  // ----------------------------------------------------------------
  // Header
  // ----------------------------------------------------------------
  function renderHeader() {
    // Distinct header background per portal type so it's unmistakable which portal you're in.
    // Agency (Index.html): dark navy #1a1a2e
    // Local client: dark teal #0A4D3A
    // Corporate: deep purple #3D1070
    document.querySelector('.header').style.background = IS_CORPORATE ? '#3D1070' : '#0A4D3A';
    $('headerGreet').textContent = 'Hello, ' + APPROVER_NAME;
    $('headerLevel').textContent = IS_CORPORATE ? 'Corporate' : 'Local Client';
  }

  // ----------------------------------------------------------------
  // Legend
  // ----------------------------------------------------------------
  function renderLegend() {
    var items = IS_CORPORATE
      ? [['Corporate_Review','Your review needed'],['Revising','Changes submitted'],['Approved','Approved'],['Published','Published']]
      : [['Local_Client_Review','Your review needed'],['Revising','Agency revising'],
         ['Awaiting_Corporate','Send to Corporate'],['Corporate_Review','Corp review'],
         ['Approved','Approved'],['Published','Published']];
    var html = '';
    items.forEach(function (pair) {
      var color = STATUS_COLORS[pair[0]] || '#ccc';
      html += '<div class="legend-item">' +
        '<div class="legend-dot" style="background:' + color + ';"></div>' +
        esc(pair[1]) + '</div>';
    });
    $('legend').innerHTML = html;
  }

  // ----------------------------------------------------------------
  // Calendar rendering
  // ----------------------------------------------------------------
  function renderCalendar() {
    var cal = $('calendar');
    var y = state.current.getFullYear();
    var m = state.current.getMonth();
    $('monthLabel').textContent = MONTH_NAMES[m] + ' ' + y;

    var postsByDay = {};
    state.posts.forEach(function (p) {
      var d = parseDateOnly(p.Scheduled_Date);
      var key = d ? ymd(d) : 'unscheduled';
      if (!postsByDay[key]) postsByDay[key] = [];
      postsByDay[key].push(p);
    });

    var html = '';
    var dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    dows.forEach(function (d) { html += '<div class="cal-dow">' + d + '</div>'; });

    var first = new Date(y, m, 1);
    var start = new Date(y, m, 1 - first.getDay());
    var today = new Date();
    var todayKey = ymd(today);

    for (var i = 0; i < 42; i++) {
      var day = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
      var inMonth = day.getMonth() === m;
      var key = ymd(day);
      var cls = 'cal-day' + (inMonth ? '' : ' other-month') + (key === todayKey ? ' today' : '');
      html += '<div class="' + cls + '"><div class="daynum">' + day.getDate() + '</div>';
      (postsByDay[key] || []).forEach(function (p) {
        html += postCardHtml(p);
      });
      html += '</div>';
    }
    cal.innerHTML = html;

    // Card click delegation.
    cal.addEventListener('click', function (e) {
      var card = e.target.closest ? e.target.closest('.post-card') : null;
      if (!card) return;
      openPost(card.getAttribute('data-id'));
    });
  }

  function postCardHtml(p) {
    var color = STATUS_COLORS[p.Status] || '#9E9E9E';
    var isDone = !!DONE_STATUSES[p.Status];
    var badgeTextColor = '#ffffff';
    var primaryUrl = getPrimaryMediaUrl(p);
    var media = classifyMedia(primaryUrl);
    var platforms = String(p.Platform || '').split(',')
      .map(function (x) { return x.trim(); }).filter(function (x) { return x; });
    var icons = platforms.map(function (pl) {
      return '<span class="platform-ico">' + esc(PLATFORM_ABBR[pl] || pl.slice(0, 2).toLowerCase()) + '</span>';
    }).join('');
    var label = STATUS_LABELS[p.Status] || p.Status.replace(/_/g, ' ');
    var thumb;
    if (media.type === 'image' || media.type === 'drive') {
      // 'drive' still uses the plain thumbnail image here (poster frame for
      // video files) — the card is too small for an embedded player.
      thumb = '<img class="pc-thumb" src="' + esc(media.thumbUrl || media.url) + '" alt="" onerror="this.style.display=\'none\'">';
    } else if (primaryUrl) {
      var linkLabel = media.type === 'box' ? '&#128230; Open in Box &#8599;' : '&#128279; View media &#8599;';
      thumb = '<a class="pc-media-link" href="' + esc(primaryUrl) + '" target="_blank" rel="noopener noreferrer">' + linkLabel + '</a>';
    } else {
      thumb = '';
    }
    var cardStyle = 'border-left-color:' + color + ';';
    return '<div class="post-card' + (isDone ? ' post-card-done' : '') +
      '" data-id="' + esc(p.ID) + '" style="' + cardStyle + '">' +
      '<div class="pc-title">' + esc(p.Title || '(untitled)') + '</div>' +
      '<div class="pc-meta">' +
      '<span class="badge" style="background:' + color + ';color:' + badgeTextColor + ';">' +
      esc(label) + '</span>' + icons + '</div>' + thumb + '</div>';
  }

  // ----------------------------------------------------------------
  // Panel open / close
  // ----------------------------------------------------------------
  // Guards against a second click firing a duplicate api_clientGetPost call
  // while the first one is still in flight. Same fix as Index.html's
  // openPost() — 2026-07-09, "too many simultaneous invocations" bug.
  var postOpening = false;
  function openPost(postId) {
    if (postOpening) return;
    postOpening = true;
    showSpinner(true);
    run('api_clientGetPost', TOKEN, postId).then(function (detail) {
      postOpening = false;
      showSpinner(false);
      state.activePost = detail.post;
      state.activeComments = detail.comments || [];
      state.activeCanUndo = !!detail.canUndo;
      renderPanel();
      $('panel').className = 'panel open';
      $('overlay').className = 'overlay open';
      $('panel').querySelector('.panel-scroll').scrollTop = 0;
    }).catch(function (err) {
      postOpening = false;
      fail(err);
    });
  }

  function closePanel() {
    $('panel').className = 'panel';
    $('overlay').className = 'overlay';
    state.activePost = null;
    state.activeComments = [];
  }

  // ----------------------------------------------------------------
  // Panel rendering
  // ----------------------------------------------------------------
  function renderPanel() {
    var p = state.activePost;
    if (!p) return;

    var color = STATUS_COLORS[p.Status] || '#9E9E9E';
    var label = STATUS_LABELS[p.Status] || p.Status.replace(/_/g, ' ');
    var badgeTextColor = '#ffffff';   // teal Revising uses white text
    var isActionable      = (p.Status === ACTIONABLE_STATUS);
    var isRevising        = (p.Status === 'Revising');
    var isReadyForCorp    = (!IS_CORPORATE && p.Status === 'Awaiting_Corporate');
    var isAwaitingCorp    = (!IS_CORPORATE && (p.Status === 'Awaiting_Corporate' || p.Status === 'Corporate_Review'));
    var canUndo        = !!(state.activeCanUndo);

    // Header status badge.
    $('panelHeaderStatus').innerHTML =
      '<span class="panel-status-label" style="background:' + color +
      ';color:' + badgeTextColor + ';">' + esc(label) + '</span>';

    // Title.
    $('panelTitle').textContent = p.Title || '(untitled)';

    // Meta chips.
    var metaHtml = '';
    var platforms = String(p.Platform || '').split(',')
      .map(function (x) { return x.trim(); }).filter(function (x) { return x; });
    platforms.forEach(function (pl) {
      metaHtml += '<span class="panel-pill">' + esc(pl) + '</span>';
    });
    if (p.Scheduled_Date) {
      metaHtml += '<span class="panel-pill">Scheduled: ' + esc(niceDate(p.Scheduled_Date)) + '</span>';
    }
    $('panelMeta').innerHTML = metaHtml;

    // Post copy.
    $('panelCopy').textContent = p.Post_Copy || '';

    // Media assets.
    renderPanelMedia(p);

    // Comments.
    renderPanelComments(state.activeComments);

    // Comment input — only when actionable.
    var commentWrap = $('panelCommentInput');
    commentWrap.style.display = isActionable ? 'block' : 'none';
    if (isActionable) { $('commentText').value = ''; }

    // Optional source tag (corporate, URL-delivered links only) — carries over
    // within this browser session so it isn't re-typed on every post.
    var showSourceTag = isActionable && IS_CORPORATE && VIA_URL_DELIVERY;
    $('sourceTagWrap').style.display = showSourceTag ? 'block' : 'none';
    if (showSourceTag) { $('sourceTagInput').value = sessionSourceTag; }

    // Required decided-by name (corporate, URL-delivered links only) — this is
    // the actual accountability field for who made the call, separate from the
    // casual source tag above. Pre-filled from this session's last entry for
    // convenience when the same person is deciding on several posts in a row.
    var showDecidedBy = isActionable && IS_CORPORATE && VIA_URL_DELIVERY;
    $('decidedByWrap').style.display = showDecidedBy ? 'block' : 'none';
    if (showDecidedBy) { $('decidedByInput').value = sessionDecidedByName; }

    // Action area.
    renderPanelActions(p, isActionable, isRevising, isReadyForCorp, isAwaitingCorp, canUndo);
  }

  function renderPanelMedia(p) {
    var sections = [
      { label: 'LinkedIn',              field: 'LinkedIn_URL' },
      { label: 'Facebook',              field: 'Facebook_URL' },
      { label: 'Instagram',             field: 'Instagram_URL' },
      { label: 'Carousel / All platforms', field: 'Carousel_URLs' }
    ];
    var html = '';
    sections.forEach(function (s) {
      var val = String(p[s.field] || '').trim();
      if (!val) return;
      var urls = val.split('\n').map(function (u) { return u.trim(); }).filter(Boolean);
      if (!urls.length) return;
      html += '<div class="media-section-label">' + esc(s.label) + '</div>';
      urls.forEach(function (url, idx) {
        var media = classifyMedia(url);
        var num = (idx + 1) + '. ';
        if (media.type === 'image') {
          html += '<div>' + num + '</div>' +
            '<img class="media-img" src="' + esc(media.url) + '" alt="Image ' + (idx + 1) + '" ' +
            'onerror="this.style.display=\'none\'">';
        } else if (media.type === 'drive') {
          // Google's own iframe-embeddable viewer — plays video with full
          // controls, and displays images normally, without us needing to
          // know which one it is ahead of time.
          html += '<div>' + num + '</div>' +
            '<iframe class="media-drive-frame" src="' + esc(media.url) + '" ' +
            'allow="autoplay" frameborder="0" allowfullscreen></iframe>';
        } else if (media.type === 'box') {
          html += '<div>' + num +
            '<a class="media-link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' +
            '&#128230; Open in Box &#8599;</a></div>';
        } else if (media.type === 'canva') {
          html += '<div>' + num +
            '<a class="media-link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' +
            'View in Canva &#8599;</a></div>';
        } else if (media.type === 'link') {
          html += '<div>' + num +
            '<a class="media-link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' +
            '&#128279; View media &#8599;</a></div>';
        }
      });
    });
    // Fallback to legacy Media_URL.
    if (!html && p.Media_URL) {
      var media = classifyMedia(p.Media_URL);
      if (media.type === 'image') {
        html = '<img class="media-img" src="' + esc(media.url) + '" alt="Media" onerror="this.style.display=\'none\'">';
      } else if (media.type === 'drive') {
        html = '<iframe class="media-drive-frame" src="' + esc(media.url) + '" ' +
          'allow="autoplay" frameborder="0" allowfullscreen></iframe>';
      } else if (media.url) {
        html = '<a class="media-link" href="' + esc(media.url) + '" target="_blank" rel="noopener noreferrer">' +
          '&#128279; View media &#8599;</a>';
      }
    }
    $('panelMedia').innerHTML = html;
  }

  function renderPanelComments(comments) {
    if (!comments || !comments.length) {
      $('panelComments').innerHTML = '<div class="no-comments">No discussion yet.</div>';
      return;
    }
    var html = '';
    comments.forEach(function (c) {
      html += '<div class="comment">' +
        '<div class="comment-meta">' +
        esc(c.Author_Name || c.Author_Email) + ' &middot; ' + esc(c.Created_Date) + '</div>' +
        '<div class="comment-text">' + esc(c.Comment_Text) + '</div></div>';
    });
    $('panelComments').innerHTML = html;
  }

  function renderPanelActions(p, isActionable, isRevising, isReadyForCorp, isAwaitingCorp, canUndo) {
    var actEl = $('panelActions');
    if (isActionable) {
      actEl.innerHTML =
        '<div class="action-row">' +
        '<button id="btnApprove" class="btn btn-approve">Approve</button>' +
        '<button id="btnChanges" class="btn btn-changes">Request Changes</button>' +
        '</div>';
      $('btnApprove').addEventListener('click', function () { submitDecision('approve'); });
      $('btnChanges').addEventListener('click', function () { submitDecision('changes'); });
    } else if (isRevising && IS_CORPORATE) {
      // Corporate requested changes — post is Revising. Show confirmation + optional undo.
      actEl.innerHTML =
        '<div class="revising-notice">' +
        'Your feedback has been submitted. The agency is working on revisions and will return this post for your review when ready.' +
        '</div>' +
        (canUndo ? '<button id="btnUndo" class="btn-undo">Undo my request</button>' : '');
    } else if (isRevising) {
      // Local client view of Revising — agency is working on it.
      actEl.innerHTML =
        '<div class="revising-notice">' +
        'The team is working on your requested changes. This post will return to your queue when revisions are ready.' +
        '</div>' +
        (canUndo ? '<button id="btnUndo" class="btn-undo">Undo my request</button>' : '');
    } else if (isReadyForCorp) {
      // Local client: post is approved, ready to send to corporate. Toolbar button is the action.
      actEl.innerHTML =
        '<div class="corp-pending-notice">' +
        '<strong>Ready for corporate review.</strong> Use the ' +
        '<strong>Send to Corporate</strong> button in the toolbar above to notify the corporate team.' +
        '</div>' +
        (canUndo ? '<button id="btnUndo" class="btn-undo">Undo my approval</button>' : '');
    } else if (isAwaitingCorp) {
      // Local client view of a post already in Corporate_Review.
      actEl.innerHTML =
        '<div class="corp-pending-notice">' +
        'This post is in corporate review. You\'ll be notified when a decision is made.' +
        '</div>';
    } else {
      actEl.innerHTML =
        '<div class="readonly-notice">No action needed at this stage.</div>';
    }
    // Wire undo button if present
    var undoBtn = $('btnUndo');
    if (undoBtn) undoBtn.addEventListener('click', undoDecision);
  }

  // ----------------------------------------------------------------
  // Decision submission
  // ----------------------------------------------------------------
  function submitDecision(decision) {
    var p = state.activePost;
    if (!p) return;
    var commentEl = $('commentText');
    var comment = commentEl ? commentEl.value.trim() : '';
    if (decision === 'changes' && !comment) {
      toast('Please describe the changes needed in the comment box first.');
      if (commentEl) commentEl.focus();
      return;
    }
    // URL-delivered corporate links require a self-reported name on the actual
    // decision — this is the accountability record for who said go, separate
    // from the optional casual source tag below (which just labels the note).
    var decidedByName = '';
    var requireDecidedBy = IS_CORPORATE && VIA_URL_DELIVERY;
    if (requireDecidedBy) {
      var decidedByEl = $('decidedByInput');
      decidedByName = decidedByEl ? decidedByEl.value.trim() : '';
      if (!decidedByName) {
        toast('Please enter your name to confirm this decision.');
        if (decidedByEl) decidedByEl.focus();
        return;
      }
    }
    // Optional casual source tag on the note itself (comments are submitted as
    // part of this decision, there's no separate "just comment" action here).
    var sourceTag = '';
    if (IS_CORPORATE && VIA_URL_DELIVERY) {
      var tagEl = $('sourceTagInput');
      sourceTag = tagEl ? tagEl.value.trim() : '';
    }
    var btnA = $('btnApprove');
    var btnC = $('btnChanges');
    if (btnA) { btnA.disabled = true; }
    if (btnC) { btnC.disabled = true; }
    showSpinner(true);
    var postTitle = p.Title;
    run('api_clientSubmitDecision', TOKEN, p.ID, decision, comment, decidedByName, sourceTag)
      .then(function (res) {
        if (requireDecidedBy) { sessionDecidedByName = decidedByName; }
        if (sourceTag) { sessionSourceTag = sourceTag; }
        showSpinner(false);
        if (!res.ok) {
          if (btnA) { btnA.disabled = false; }
          if (btnC) { btnC.disabled = false; }
          closePanel();
          toast(res.message || 'This post has already been handled.');
          return;
        }
        closePanel();
        if (decision === 'approve') {
          $('confirmIcon').innerHTML = '&#9989;';
          $('confirmTitle').textContent = 'Mahalo! We\'ve received your approval.';
          $('confirmMsg').textContent = 'You approved "' + postTitle + '". No further action is needed on your part.';
        } else {
          $('confirmIcon').innerHTML = '&#128260;';
          $('confirmTitle').textContent = 'Mahalo! We\'ve received your feedback.';
          $('confirmMsg').textContent = 'Your requested changes for "' + postTitle + '" have been noted. The team will follow up with revisions.';
        }
        $('confirmScreen').className = 'confirm-screen open';
        loadPosts(); // Refresh calendar in background.
        // Immediately update send badge — don't wait for the timer.
        if (IS_CORPORATE) { loadCorpPendingBatch(); } else { loadLocalPendingBatch(); }
      })
      .catch(function (err) {
        if (btnA) { btnA.disabled = false; }
        if (btnC) { btnC.disabled = false; }
        fail(err);
      });
  }

  // ----------------------------------------------------------------
  // Undo last decision
  // ----------------------------------------------------------------
  function undoDecision() {
    var p = state.activePost;
    if (!p) return;
    var undoBtn = $('btnUndo');
    if (undoBtn) undoBtn.disabled = true;
    showSpinner(true);
    run('api_clientUndoDecision', TOKEN, p.ID)
      .then(function (res) {
        showSpinner(false);
        if (!res.ok) {
          if (undoBtn) undoBtn.disabled = false;
          toast(res.message || 'Could not undo decision.');
          return;
        }
        // Re-open the panel so the client sees their action buttons again.
        openPost(p.ID);
        toast('Decision reversed. You can now re-review this post.');
        loadPosts(); // Refresh calendar in background.
        if (IS_CORPORATE) { loadCorpPendingBatch(); } else { loadLocalPendingBatch(); }
      })
      .catch(function (err) {
        if (undoBtn) undoBtn.disabled = false;
        fail(err);
      });
  }

  // ----------------------------------------------------------------
  // Comment submission
  // ----------------------------------------------------------------
  // Note: not currently wired to any button. Corporate/local comments are
  // submitted as the optional note attached to an Approve/Request Changes
  // decision (see submitDecision), not as a standalone action in this portal.
  // Left in place in case a standalone "just comment" action gets added later.
  function addComment() {
    var p = state.activePost;
    if (!p) return;
    var commentEl = $('commentText');
    var text = commentEl ? commentEl.value.trim() : '';
    if (!text) { toast('Please write a comment first.'); return; }
    var btn = $('btnAddComment');
    if (btn) btn.disabled = true;
    showSpinner(true);
    run('api_clientAddComment', TOKEN, p.ID, text)
      .then(function () {
        commentEl.value = '';
        return run('api_clientGetPost', TOKEN, p.ID);
      })
      .then(function (detail) {
        showSpinner(false);
        state.activeComments = detail.comments || [];
        renderPanelComments(state.activeComments);
        if (btn) btn.disabled = false;
        toast('Comment sent.');
      })
      .catch(function (err) {
        if (btn) btn.disabled = false;
        fail(err);
      });
  }

  // ----------------------------------------------------------------
  // Data loading
  // ----------------------------------------------------------------
  function loadPosts() {
    run('api_clientGetAllPosts', TOKEN).then(function (posts) {
      state.posts = posts || [];
      renderCalendar();
    }).catch(function (err) {
      console.error('loadPosts failed:', err);
    });
  }

  // ----------------------------------------------------------------
  // Local portal: batch Send to Corporate toolbar badge
  // ----------------------------------------------------------------
  // Combined count of everything ready to go out: posts ready for corporate
  // review plus Changes_Requested notices still owed to agency. Both ride the
  // same alert-and-send-anytime pattern (MJ, 2026-07-07).
  var localPendingCounts = { awaitingCorpCount: 0, pendingChangesCount: 0 };

  function loadLocalPendingBatch() {
    if (IS_CORPORATE) return; // Corporate portal has no send badge
    Promise.all([
      run('api_localGetPendingCorpCount', TOKEN),
      run('api_localGetPendingChangesCount', TOKEN)
    ]).then(function (results) {
      var awaitingCorpCount = (results[0] && typeof results[0].awaitingCorpCount === 'number') ? results[0].awaitingCorpCount : 0;
      var pendingChangesCount = (results[1] && typeof results[1].pendingChangesCount === 'number') ? results[1].pendingChangesCount : 0;
      localPendingCounts = { awaitingCorpCount: awaitingCorpCount, pendingChangesCount: pendingChangesCount };
      var total = awaitingCorpCount + pendingChangesCount;

      var badge = $('badgeAwaitingCorp');
      var btn   = $('btnSendToCorp');
      if (total > 0) {
        badge.textContent = '⚠️ ' + total + ' ready to send';
        badge.style.display = 'inline-block';
        btn.style.display   = 'inline-block';
      } else {
        badge.style.display = 'none';
        btn.style.display   = 'none';
      }
    }).catch(function (err) {
      console.error('loadLocalPendingBatch failed:', err);
    });
  }

  // ----------------------------------------------------------------
  // Send to Corporate picker — choose recipients and delivery channel
  // (email and/or a copyable portal link) instead of blasting everyone.
  // If nothing's pending for corporate but Changes_Requested notices are
  // waiting, there's nothing to pick, so send those directly instead of
  // opening an empty picker.
  // ----------------------------------------------------------------
  var sendPickerApprovers = [];

  function openSendToCorporatePicker() {
    if (localPendingCounts.awaitingCorpCount === 0 && localPendingCounts.pendingChangesCount > 0) {
      sendToCorporateDirect([]);
      return;
    }
    $('sendPickerTitle').textContent = 'Send to Corporate';
    $('sendPickerBody').innerHTML = '<div class="sp-empty">Loading…</div>';
    $('btnConfirmSendPicker').textContent = 'Send';
    $('btnConfirmSendPicker').onclick = confirmSendToCorporate;
    $('sendPickerOverlay').className = 'overlay open';
    $('sendPickerModal').className = 'send-picker-modal open';

    run('api_clientGetCorporateApprovers', TOKEN).then(function (approvers) {
      sendPickerApprovers = approvers || [];
      renderSendToCorporatePicker();
    }).catch(function (err) {
      $('sendPickerBody').innerHTML = '<div class="sp-empty">Could not load recipients.</div>';
      console.error('openSendToCorporatePicker failed:', err && err.message ? err.message : String(err));
    });
  }

  function closeSendPicker() {
    $('sendPickerOverlay').className = 'overlay';
    $('sendPickerModal').className = 'send-picker-modal';
  }

  function renderSendToCorporatePicker() {
    if (!sendPickerApprovers.length) {
      $('sendPickerBody').innerHTML = '<div class="sp-empty">Nothing pending to send.</div>';
      return;
    }
    var html = '<div class="sp-hint">Choose who gets this batch, and whether by email, a copyable portal link, or both.</div>';
    sendPickerApprovers.forEach(function (ap, i) {
      var def = ap.DefaultChannel || 'Email';
      var emailChecked = def !== 'URL';
      var urlChecked = def === 'URL' || def === 'Both';
      html += '<div class="sp-row" data-idx="' + i + '">' +
        '<label style="display:flex;align-items:center;gap:8px;flex:1;">' +
        '<input type="checkbox" class="sp-include" checked> ' +
        '<span class="sp-name">' + esc(ap.Name) + '</span></label>' +
        '<div class="sp-channels">' +
        '<label><input type="checkbox" class="sp-email" ' + (emailChecked ? 'checked' : '') + '> Email</label>' +
        '<label><input type="checkbox" class="sp-url" ' + (urlChecked ? 'checked' : '') + '> URL</label>' +
        '</div></div>';
    });
    $('sendPickerBody').innerHTML = html;
  }

  function confirmSendToCorporate() {
    var rows = document.querySelectorAll('#sendPickerBody .sp-row');
    var selections = [];
    rows.forEach(function (row) {
      var idx = parseInt(row.getAttribute('data-idx'), 10);
      var ap = sendPickerApprovers[idx];
      if (!row.querySelector('.sp-include').checked) return;
      var viaEmail = row.querySelector('.sp-email').checked;
      var viaUrl = row.querySelector('.sp-url').checked;
      if (!viaEmail && !viaUrl) return;
      selections.push({ Email: ap.Email, ViaEmail: viaEmail, ViaUrl: viaUrl });
    });
    // Only require a selection when there was actually something to pick from.
    // If corporate approvers exist but none were selected, that's a mistake to
    // catch. If there was nothing pending for corporate to begin with, an
    // empty selection is fine, it just means this send is only flushing
    // pending Changes_Requested notices.
    if (!selections.length && sendPickerApprovers.length) {
      toast('Select at least one recipient and channel.', 'error');
      return;
    }
    sendToCorporateDirect(selections);
  }

  function sendToCorporateDirect(selections) {
    showSpinner(true);
    run('api_localSendToCorporate', TOKEN, selections).then(function (res) {
      showSpinner(false);
      var sent   = (res && typeof res.sent   === 'number') ? res.sent   : 0;
      var errors = (res && typeof res.errors === 'number') ? res.errors : 0;
      var links  = (res && res.links) || [];
      var changesNotified = (res && typeof res.changesNotified === 'number') ? res.changesNotified : 0;
      if (links.length) {
        showLinkResults(links);
      } else {
        closeSendPicker();
      }
      var totalProcessed = sent + links.length + changesNotified;
      if (errors > 0 && sent === 0) {
        toast('Send failed — notifications could not be delivered.\nPlease try again or contact Anthology FINN Partners.', 'error');
      } else if (errors > 0) {
        showAllCaughtUp('badgeAwaitingCorp', 'btnSendToCorp');
        toast(sent + ' post' + (sent !== 1 ? 's' : '') + ' sent to corporate review, but some notifications may not have been delivered.', 'error');
      } else if (totalProcessed > 0) {
        showAllCaughtUp('badgeAwaitingCorp', 'btnSendToCorp');
        var parts = [];
        if (sent || links.length) parts.push((sent + links.length) + ' to corporate review');
        if (changesNotified) parts.push(changesNotified + ' change request' + (changesNotified !== 1 ? 's' : '') + ' to agency');
        toast('Sent: ' + parts.join(', ') + '.');
      } else {
        toast('Nothing to send at this time.');
      }
      loadPosts();
      loadLocalPendingBatch();
    }).catch(function (err) {
      showSpinner(false);
      fail(err);
    });
  }

  function showLinkResults(links) {
    var html = '<div class="sp-hint">Copy each link and paste it into the corporate communications platform yourself, the app can’t deliver these automatically.</div>';
    links.forEach(function (l) {
      html += '<div class="sp-link-row"><div class="sp-link-name">' + esc(l.Name) + '</div>' +
        '<input type="text" readonly value="' + esc(l.Url) + '" onclick="this.select();"></div>';
    });
    $('sendPickerTitle').textContent = 'Copy these links';
    $('sendPickerBody').innerHTML = html;
    $('btnConfirmSendPicker').textContent = 'Done';
    $('btnConfirmSendPicker').onclick = closeSendPicker;
  }

  // ----------------------------------------------------------------
  // Corporate portal: batch Send Responses toolbar badge
  // ----------------------------------------------------------------
  function loadCorpPendingBatch() {
    if (!IS_CORPORATE) return;
    run('api_corporateGetPendingBatchCount', TOKEN).then(function (res) {
      var count = (res && typeof res.pendingCount === 'number') ? res.pendingCount : 0;
      var badge = $('badgeCorpResponses');
      var btn   = $('btnSendResponses');
      if (count > 0) {
        badge.textContent = '⚠️ ' + count + ' post' + (count !== 1 ? 's' : '') + ' — send responses!';
        badge.style.display = 'inline-block';
        btn.style.display   = 'inline-block';
      } else {
        badge.style.display = 'none';
        btn.style.display   = 'none';
      }
    }).catch(function (err) {
      console.error('loadCorpPendingBatch failed:', err);
    });
  }

  function showAllCaughtUp(badgeId, btnId) {
    var badge = $(badgeId);
    var btn   = $(btnId);
    badge.textContent = '✓ All caught up';
    badge.style.background = '#4CAF50';
    badge.style.animation  = 'none';
    badge.style.display    = 'inline-block';
    btn.style.display      = 'none';
    setTimeout(function () {
      badge.style.display = 'none';
      badge.style.background = '';
      badge.style.animation  = 'pulse 1.5s infinite';
    }, 4000);
  }

  function corpSendBatch() {
    if (!confirm('Send your review decisions to the local client and agency now?\n\nOne summary email will go to each — covering all posts you\'ve reviewed since your last send.')) return;
    showSpinner(true);
    run('api_corporateSendBatch', TOKEN).then(function (res) {
      showSpinner(false);
      var sent   = (res && typeof res.sent   === 'number') ? res.sent   : 0;
      var errors = (res && typeof res.errors === 'number') ? res.errors : 0;
      if (errors > 0 && sent === 0) {
        toast('Send failed — notifications could not be delivered.\nPlease try again or contact Anthology FINN Partners.', 'error');
        loadCorpPendingBatch();
      } else if (errors > 0) {
        showAllCaughtUp('badgeCorpResponses', 'btnSendResponses');
        toast('Decisions sent for ' + sent + ' post' + (sent !== 1 ? 's' : '') + ', but some notifications may not have been delivered.\nVerify the local client received their email.', 'error');
      } else if (sent > 0) {
        showAllCaughtUp('badgeCorpResponses', 'btnSendResponses');
        toast('Decisions sent for ' + sent + ' post' + (sent !== 1 ? 's' : '') + '. Local client and agency have been notified.');
      } else {
        toast('No pending decisions to send.');
        loadCorpPendingBatch();
      }
    }).catch(function (err) {
      showSpinner(false);
      fail(err);
    });
  }

  // ----------------------------------------------------------------
  // Event wiring
  // ----------------------------------------------------------------
  $('btnPrev').addEventListener('click', function () {
    state.current = new Date(state.current.getFullYear(), state.current.getMonth() - 1, 1);
    renderCalendar();
  });
  $('btnNext').addEventListener('click', function () {
    state.current = new Date(state.current.getFullYear(), state.current.getMonth() + 1, 1);
    renderCalendar();
  });
  $('btnToday').addEventListener('click', function () {
    state.current = new Date();
    renderCalendar();
  });
  $('btnClosePanel').addEventListener('click', closePanel);
  $('overlay').addEventListener('click', closePanel);
  if (!IS_CORPORATE) {
    $('btnSendToCorp').addEventListener('click', openSendToCorporatePicker);
  }
  if (IS_CORPORATE) {
    $('btnSendResponses').addEventListener('click', corpSendBatch);
  }
  $('btnCloseSendPicker').addEventListener('click', closeSendPicker);
  $('btnCancelSendPicker').addEventListener('click', closeSendPicker);
  $('sendPickerOverlay').addEventListener('click', closeSendPicker);
  $('btnBackToPortal').addEventListener('click', function () {
    $('confirmScreen').className = 'confirm-screen';
  });

  // ----------------------------------------------------------------
  // Auto-refresh every 2 minutes (silent, skips if panel is open)
  // ----------------------------------------------------------------
  // Posts refresh every 2 minutes; badge checks every 30 seconds.
  setInterval(function () {
    if (!state.activePost) { loadPosts(); }
  }, 120000);
  setInterval(function () {
    if (IS_CORPORATE) { loadCorpPendingBatch(); } else { loadLocalPendingBatch(); }
  }, 30000);

  // ----------------------------------------------------------------
  // Init
  // ----------------------------------------------------------------
  renderHeader();
  renderLegend();
  if (!IS_CORPORATE) { loadLocalPendingBatch(); }
  if (IS_CORPORATE) { loadCorpPendingBatch(); }
  showSpinner(true);
  run('api_clientGetAllPosts', TOKEN).then(function (posts) {
    state.posts = posts || [];
    // One-time only: open the calendar on whichever month actually has
    // something waiting for this approver, instead of always today's month.
    var target = earliestActionableDate();
    if (target) {
      state.current = new Date(target.getFullYear(), target.getMonth(), 1);
    }
    renderCalendar();
    showSpinner(false);
  }).catch(function (err) {
    showSpinner(false);
    fail(err);
  });

})();
</script>
